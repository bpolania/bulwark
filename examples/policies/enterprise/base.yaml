metadata:
  name: enterprise-base
  description: "Locked-down base policy. Deny by default, explicit allowlists."
  scope: global

rules:
  - name: default-deny
    verdict: deny
    reason: "Enterprise: deny by default"
    priority: 0
    match: {}

  - name: allow-read-operations
    verdict: allow
    reason: "Read operations are generally safe"
    priority: 10
    match:
      actions: ["read*", "get*", "list*", "search*", "describe*"]
