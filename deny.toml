# cargo-deny configuration (v2)
# Run: cargo deny check

[advisories]
version = 2
yanked = "deny"
ignore = [
    # Unmaintained transitive deps — no replacement available yet
    "RUSTSEC-2024-0384", # instant (via parking_lot -> lock_api)
    "RUSTSEC-2025-0134", # rustls-pemfile (via reqwest -> hyper-rustls)
    "RUSTSEC-2023-0071", # rsa Marvin Attack (via openidconnect, no fix available)
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
